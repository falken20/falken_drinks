{% extends 'base.html' %}

{% block content %}

<div class="container" style="text-align: center; max-width: 820px; margin: 0 auto;">
    <div style="background: rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 22px 18px; backdrop-filter: blur(6px);">
        <div style="display: inline-flex; align-items: center; justify-content: center; width: 62px; height: 62px; border-radius: 50%; background: rgba(40, 167, 69, 0.18); margin-bottom: 14px;">
            <i class="bi bi-check2-square" style="font-size: 1.6rem; color: #b8f7c5;" title="Daily Habits"></i>
        </div>

        <h4 style="color: white; font-weight: 700; margin-bottom: 8px;">Daily Habits</h4>
        <p style="color: rgba(255, 255, 255, 0.85); font-size: 0.95rem; margin: 0 auto 18px auto; max-width: 560px;">
            {{ habits_overview.headline }}
        </p>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; text-align: left;">
            {% for habit in habits_overview.habits %}
            <div style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 14px; padding: 14px; min-height: 140px;">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; color: #d7ffe0; font-weight: 700;">
                    <i class="bi bi-check-circle"></i>
                    <span>{{ habit.name }}</span>
                </div>
                <p style="color: rgba(255, 255, 255, 0.8); font-size: 0.86rem; margin-bottom: 0;">
                    {{ habit.description }}
                </p>
            </div>
            {% endfor %}
        </div>

        <div style="margin-top: 18px;">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-sm" style="min-width: 130px;">
                Back to Home
            </a>
        </div>
    </div>
</div>

{% endblock %}
