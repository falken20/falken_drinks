{% extends "base.html" %}

{% block content %}

<style>
    section.hero.is-primary.is-fullheight.mainPage {
        height: auto !important;
        min-height: 100vh;
        overflow-y: auto;
    }

    section.hero.is-primary.is-fullheight.mainPage .hero-body {
        overflow: visible;
    }

    .drinks-mgmt-page {
        max-width: 1120px;
        text-align: center;
    }

    .drinks-mgmt-header {
        margin-bottom: 12px;
    }

    .drinks-mgmt-header h2 {
        color: #fff;
        margin: 0;
        font-size: 1.45rem;
        font-weight: 700;
    }

    .mgmt-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: start;
    }

    .mgmt-panel {
        background: rgba(8, 16, 28, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 12px;
        padding: 12px;
        text-align: left;
    }

    .mgmt-panel-title {
        color: #f7fbff;
        margin: 0 0 10px 0;
        font-size: 1.05rem;
        font-weight: 700;
        text-align: left;
    }

    .compact-form-group {
        margin-bottom: 10px;
    }

    .compact-form-group label {
        color: #f2f7ff;
        display: block;
        margin-bottom: 4px;
        font-size: 0.86rem;
        font-weight: 600;
    }

    .compact-help {
        color: #e9f1ff !important;
        display: block;
        margin-top: 3px;
        font-size: 0.82rem !important;
        line-height: 1.25;
    }

    .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .slider-value {
        color: #ffffff;
        min-width: 45px;
        text-align: right;
        font-size: 0.86rem;
        font-weight: 700;
    }

    .form-actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 4px;
    }

    .drinks-list-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
    }

    .drinks-list-head h3 {
        color: #f7fbff;
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
    }

    .drink-card {
        background: rgba(0, 0, 0, 0.62);
        border-radius: 10px;
        padding: 8px 10px;
        margin-bottom: 6px;
        border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .drink-card-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
    }

    .drink-main {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 8px;
    }

    .drink-icon-wrap {
        flex-shrink: 0;
    }

    .drink-icon-image,
    .drink-icon-fallback {
        height: 30px;
        width: 30px;
        border-radius: 50%;
    }

    .drink-icon-image {
        background: rgba(255, 255, 255, 0.1);
        padding: 3px;
    }

    .drink-icon-fallback {
        background: rgba(13, 110, 253, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 0.8rem;
    }

    .drink-info {
        min-width: 0;
        color: #f8fbff;
        font-size: 0.86rem;
        line-height: 1.25;
    }

    .drink-name {
        display: block;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 2px;
    }

    .drink-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        font-size: 0.82rem;
        font-weight: 600;
    }

    .drink-meta span {
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.35);
    }

    .drink-actions {
        display: flex;
        gap: 6px;
    }

    .empty-drinks {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 22px 14px;
        color: #e5edff;
        text-align: center;
    }

    .empty-drinks .icon {
        font-size: 2rem;
        margin-bottom: 6px;
    }

    .empty-drinks h4 {
        color: #ffffff;
        margin-bottom: 5px;
        font-size: 1rem;
    }

    .empty-drinks p {
        color: #e5edff;
        font-size: 0.9rem !important;
        text-align: center;
        margin: 0;
    }

    .back-home-wrap {
        margin: 14px auto 8px auto;
        text-align: center;
    }

    @media (min-width: 992px) {
        .mgmt-layout {
            grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
        }
    }

    @media (max-width: 576px) {
        .drinks-mgmt-page {
            padding-left: 6px;
            padding-right: 6px;
        }

        .form-actions {
            flex-direction: column;
        }

        .form-actions .btn {
            width: 100%;
        }

        .drink-card-row {
            grid-template-columns: 1fr;
        }

        .drink-actions {
            justify-content: flex-end;
        }
    }
</style>

<script>
    window.onload = function() {
        activeVisibility('drinks', 'drinks_icon');
    }
</script>

<div class="container drinks-mgmt-page py-2">    
    
    <!-- Drinks Management Header -->
    <div class="drinks-mgmt-header">
        <h2>Drinks Management</h2>
    </div>

    <div class="mgmt-layout">
        <!-- Add/Edit Drink Form -->
        <div class="mgmt-panel">
            <h3 class="mgmt-panel-title" id="form-title">Add New Drink</h3>

            <form id="drink-form">
                <input type="hidden" id="drink-id" value="">

                <!-- Drink Name -->
                <div class="compact-form-group">
                    <label for="drink-name">Drink Name *</label>
                    <input type="text" id="drink-name" class="form-control form-control-sm" placeholder="e.g., Water, Coffee, Wine..." required maxlength="100">
                </div>

                <!-- Water Percentage -->
                <div class="compact-form-group">
                    <label for="water-percentage">Water Percentage *</label>
                    <div class="slider-row">
                        <input type="range" id="water-percentage" class="form-range" min="0" max="100" value="100" style="flex: 1;">
                        <span id="water-value" class="slider-value">100%</span>
                    </div>
                </div>

                <!-- Alcohol Percentage -->
                <div class="compact-form-group">
                    <label for="alcohol-percentage">Alcohol Percentage *</label>
                    <div class="slider-row">
                        <input type="range" id="alcohol-percentage" class="form-range" min="0" max="100" value="0" style="flex: 1;">
                        <span id="alcohol-value" class="slider-value">0%</span>
                    </div>
                </div>

                <!-- Other Percentage (Read-only) -->
                <div class="compact-form-group">
                    <label>Other Percentage (Auto-calculated)</label>
                    <div class="slider-row">
                        <input type="range" id="other-percentage" class="form-range" min="0" max="100" value="0" style="flex: 1; pointer-events: none; opacity: 0.6;" disabled>
                        <span id="other-value" class="slider-value">0%</span>
                    </div>
                </div>

                <!-- Drink Image (Optional) -->
                <div class="compact-form-group">
                    <label for="drink-image">Image Filename (Optional)</label>
                    <input type="text" id="drink-image" class="form-control form-control-sm" placeholder="e.g., icons8-water-96.png">
                    <small class="compact-help">Leave empty for auto-generated icon</small>
                </div>

                <!-- Counts as Water -->
                <div class="compact-form-group" style="margin-bottom: 12px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="counts-as-water" class="form-check-input" checked style="width: 18px; height: 18px; cursor: pointer;">
                        <label for="counts-as-water" style="color: white; margin: 0; font-size: 0.84rem; cursor: pointer;">
                            Count this drink towards daily water intake
                        </label>
                    </div>
                    <small class="compact-help">
                        Alcoholic drinks are automatically unchecked by default
                    </small>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-success btn-sm" id="save-btn">
                        <i class="bi bi-check-lg"></i> Save Drink
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" id="cancel-btn" onclick="resetForm()">
                        <i class="bi bi-x-lg"></i> Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- Drinks List -->
        <div class="mgmt-panel">
            <div class="drinks-list-head">
                <h3>All Drinks</h3>
                <button class="btn btn-primary btn-sm" onclick="refreshDrinks()">
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
            </div>

            <div id="drinks-list">
                <!-- Drinks will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Back to Home Button -->
    <div class="back-home-wrap">
        <a href="{{ url_for('main.index') }}" class="btn btn-primary" style="min-width: 150px;">Back to Home</a>
    </div>

</div>

<!-- Loading Modal -->
<div class="modal" id="loadingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false" aria-hidden="true" style="display: none !important;">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content" style="background: rgba(0,0,0,0.8); border: 1px solid #333;">
            <div class="modal-body text-center" style="color: white;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <div style="margin-top: 15px;">Processing...</div>
            </div>
        </div>
    </div>
</div>

<script>
// Global variables
let isEditing = false;
let editingDrinkId = null;

// Initialize page
document.addEventListener('DOMContentLoaded', function() {
    // Ensure modal is hidden initially
    hideLoading();
    
    // Load drinks on page load
    loadDrinks();
    
    // Setup form handlers
    setupFormHandlers();
    
    // Setup percentage sliders
    setupPercentageSliders();
});

// Setup form event handlers
function setupFormHandlers() {
    const form = document.getElementById('drink-form');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        saveDrink();
    });
}

// Setup percentage sliders with auto-calculation
function setupPercentageSliders() {
    const waterSlider = document.getElementById('water-percentage');
    const alcoholSlider = document.getElementById('alcohol-percentage');
    const otherSlider = document.getElementById('other-percentage');
    const waterValue = document.getElementById('water-value');
    const alcoholValue = document.getElementById('alcohol-value');
    const otherValue = document.getElementById('other-value');
    const countsAsWaterCheckbox = document.getElementById('counts-as-water');
    
    function updatePercentages() {
        const water = parseInt(waterSlider.value);
        const alcohol = parseInt(alcoholSlider.value);
        const other = Math.max(0, 100 - water - alcohol);
        
        waterValue.textContent = water + '%';
        alcoholValue.textContent = alcohol + '%';
        otherValue.textContent = other + '%';
        otherSlider.value = other;
        
        // Auto-uncheck counts_as_water if alcohol > 0
        if (alcohol > 0) {
            countsAsWaterCheckbox.checked = false;
        } else {
            countsAsWaterCheckbox.checked = true;
        }
        
        // Validate total doesn't exceed 100%
        if (water + alcohol > 100) {
            otherValue.style.color = '#dc3545';
            otherValue.textContent = 'Invalid: Total > 100%';
        } else {
            otherValue.style.color = 'white';
        }
    }
    
    waterSlider.addEventListener('input', updatePercentages);
    alcoholSlider.addEventListener('input', updatePercentages);
    
    // Initial calculation
    updatePercentages();
}

// Load all drinks
function loadDrinks() {
    console.log('Loading drinks...');
    showLoading();
    
    fetch('/api/drinks', {
        method: 'GET',
        headers: {
            'Content-Type': 'application/json',
        },
        credentials: 'same-origin'
    })
    .then(response => {
        console.log('Received response:', response.status);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
    })
    .then(data => {
        console.log('Received data:', data);
        if (data.success) {
            displayDrinks(data.drinks);
        } else {
            alert('Error loading drinks: ' + data.message);
        }
    })
    .catch(error => {
        console.error('Error loading drinks:', error);
        alert('Error loading drinks: ' + error.message);
    })
    .finally(() => {
        console.log('Hiding loading modal...');
        // Ensure loading modal is always hidden
        hideLoading();
    });
}

// Display drinks in the list
function displayDrinks(drinks) {
    const drinksList = document.getElementById('drinks-list');
    
    if (drinks.length === 0) {
        drinksList.innerHTML = `
            <div class="empty-drinks">
                <div class="icon">🍹</div>
                <h4>No drinks found</h4>
                <p>Create your first drink type using the form above!</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    drinks.forEach(drink => {
        const hasImage = drink.drink_image && drink.drink_image.trim() !== '';
        const otherPercentage = 100 - drink.drink_water_percentage - drink.drink_alcohol_percentage;
        
        html += `
            <div class="drink-card">
                <div class="drink-card-row">
                    <div class="drink-main">
                        <!-- Drink Icon -->
                        <div class="drink-icon-wrap">
                            ${hasImage ? 
                                `<img src="/static/images/drinks/${drink.drink_image}" alt="${drink.drink_name}" class="drink-icon-image">` :
                                `<div class="drink-icon-fallback">
                                    <span>${drink.drink_name.charAt(0).toUpperCase()}</span>
                                </div>`
                            }
                        </div>
                        
                        <!-- Drink Info -->
                        <div class="drink-info">
                            <span class="drink-name">${drink.drink_name}</span>
                            <div class="drink-meta">
                                <span style="color: #0d6efd;">💧 ${drink.drink_water_percentage}%</span>${drink.drink_alcohol_percentage > 0 ? ` <span style="color: #dc3545;">🍷 ${drink.drink_alcohol_percentage}%</span>` : ''}${otherPercentage > 0 ? ` <span style="color: #198754;">🥤 ${otherPercentage}%</span>` : ''}
                            </div>
                        </div>
                    </div>
                    
                    <!-- Actions -->
                    <div class="drink-actions">
                        <button class="btn btn-sm btn-outline-primary" onclick="editDrink(${drink.drink_id})" title="Edit">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteDrink(${drink.drink_id}, '${drink.drink_name}')" title="Delete">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    });
    
    drinksList.innerHTML = html;
}

// Save drink (create or update)
function saveDrink() {
    const drinkName = document.getElementById('drink-name').value.trim();
    const waterPercentage = parseInt(document.getElementById('water-percentage').value);
    const alcoholPercentage = parseInt(document.getElementById('alcohol-percentage').value);
    const drinkImage = document.getElementById('drink-image').value.trim();
    const countsAsWater = document.getElementById('counts-as-water').checked;
    
    // Validation
    if (!drinkName) {
        alert('Please enter a drink name');
        return;
    }
    
    if (waterPercentage + alcoholPercentage > 100) {
        alert('Water and alcohol percentages cannot exceed 100% total');
        return;
    }
    
    const drinkData = {
        drink_name: drinkName,
        drink_water_percentage: waterPercentage,
        drink_alcohol_percentage: alcoholPercentage,
        drink_image: drinkImage || null,
        counts_as_water: countsAsWater
    };
    
    const url = isEditing ? `/api/drinks/${editingDrinkId}` : '/api/drinks';
    const method = isEditing ? 'PUT' : 'POST';
    
    showLoading();
    
    fetch(url, {
        method: method,
        headers: {
            'Content-Type': 'application/json',
        },
        credentials: 'same-origin',
        body: JSON.stringify(drinkData)
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
    })
    .then(data => {
        hideLoading();
        if (data.success) {
            alert(data.message);
            resetForm();
            loadDrinks(); // Refresh the list
        } else {
            alert('Error: ' + data.message);
        }
    })
    .catch(error => {
        hideLoading();
        console.error('Error:', error);
        alert('Error saving drink: ' + error.message);
    })
    .finally(() => {
        // Ensure loading modal is always hidden
        hideLoading();
    });
}

// Edit drink
function editDrink(drinkId) {
    // Find the drink data from the current drinks list
    fetch(`/api/drinks`, {
        method: 'GET',
        headers: {
            'Content-Type': 'application/json',
        },
        credentials: 'same-origin'
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const drink = data.drinks.find(d => d.drink_id === drinkId);
            if (drink) {
                populateForm(drink);
            }
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Error loading drink data');
    });
}

// Populate form with drink data for editing
function populateForm(drink) {
    isEditing = true;
    editingDrinkId = drink.drink_id;
    
    document.getElementById('form-title').textContent = 'Edit Drink';
    document.getElementById('drink-name').value = drink.drink_name;
    document.getElementById('water-percentage').value = drink.drink_water_percentage;
    document.getElementById('alcohol-percentage').value = drink.drink_alcohol_percentage;
    document.getElementById('drink-image').value = drink.drink_image || '';
    document.getElementById('counts-as-water').checked = drink.counts_as_water !== undefined ? drink.counts_as_water : true;
    document.getElementById('save-btn').innerHTML = '<i class="bi bi-check-lg"></i> Update Drink';
    
    // Update percentage displays
    document.getElementById('water-value').textContent = drink.drink_water_percentage + '%';
    document.getElementById('alcohol-value').textContent = drink.drink_alcohol_percentage + '%';
    const otherPercentage = 100 - drink.drink_water_percentage - drink.drink_alcohol_percentage;
    document.getElementById('other-value').textContent = otherPercentage + '%';
    document.getElementById('other-percentage').value = otherPercentage;
    
    // Scroll to form
    document.getElementById('drink-form').scrollIntoView({ behavior: 'smooth' });
}

// Delete drink
function deleteDrink(drinkId, drinkName) {
    if (!confirm(`Are you sure you want to delete "${drinkName}"?\n\nThis action cannot be undone and will fail if the drink has associated logs.`)) {
        return;
    }
    
    showLoading();
    
    fetch(`/api/drinks/${drinkId}`, {
        method: 'DELETE',
        headers: {
            'Content-Type': 'application/json',
        },
        credentials: 'same-origin'
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
    })
    .then(data => {
        hideLoading();
        if (data.success) {
            alert(data.message);
            loadDrinks(); // Refresh the list
        } else {
            alert('Error: ' + data.message);
        }
    })
    .catch(error => {
        hideLoading();
        console.error('Error:', error);
        alert('Error deleting drink: ' + error.message);
    })
    .finally(() => {
        // Ensure loading modal is always hidden
        hideLoading();
    });
}

// Reset form to initial state
function resetForm() {
    isEditing = false;
    editingDrinkId = null;
    
    document.getElementById('form-title').textContent = 'Add New Drink';
    document.getElementById('drink-form').reset();
    document.getElementById('water-percentage').value = 100;
    document.getElementById('alcohol-percentage').value = 0;
    document.getElementById('counts-as-water').checked = true;
    document.getElementById('save-btn').innerHTML = '<i class="bi bi-check-lg"></i> Save Drink';
    
    // Reset percentage displays
    document.getElementById('water-value').textContent = '100%';
    document.getElementById('alcohol-value').textContent = '0%';
    document.getElementById('other-value').textContent = '0%';
    document.getElementById('other-value').style.color = 'white';
    document.getElementById('other-percentage').value = 0;
}

// Refresh drinks list
function refreshDrinks() {
    loadDrinks();
}

// Show loading modal
function showLoading() {
    try {
        const modalElement = document.getElementById('loadingModal');
        if (modalElement) {
            const modal = new bootstrap.Modal(modalElement);
            modal.show();
        }
    } catch (error) {
        console.error('Error showing loading modal:', error);
    }
}

// Hide loading modal
function hideLoading() {
    console.log('Attempting to hide loading modal...');
    try {
        const modalElement = document.getElementById('loadingModal');
        if (modalElement) {
            // Try to get Bootstrap modal instance
            const modal = bootstrap.Modal.getInstance(modalElement);
            if (modal) {
                console.log('Hiding modal using Bootstrap instance');
                modal.hide();
            }
            
            // Force hide the modal directly (in case Bootstrap instance doesn't exist)
            modalElement.classList.remove('show');
            modalElement.setAttribute('aria-hidden', 'true');
            modalElement.setAttribute('style', 'display: none;');
            
            // Remove modal-open class from body
            document.body.classList.remove('modal-open');
            
            // Remove all backdrops
            const backdrops = document.querySelectorAll('.modal-backdrop');
            backdrops.forEach(backdrop => backdrop.remove());
            
            // Reset body padding
            document.body.style.paddingRight = '';
            document.body.style.overflow = '';
            
            console.log('Loading modal hidden successfully');
        } else {
            console.warn('Loading modal element not found');
        }
    } catch (error) {
        console.error('Error hiding loading modal:', error);
        // Last resort: force hide everything
        const modalElement = document.getElementById('loadingModal');
        if (modalElement) {
            modalElement.style.display = 'none';
            modalElement.classList.remove('show');
        }
        document.body.classList.remove('modal-open');
        document.body.style.paddingRight = '';
        document.body.style.overflow = '';
        const backdrops = document.querySelectorAll('.modal-backdrop');
        backdrops.forEach(backdrop => backdrop.remove());
    }
}
</script>

{% endblock content %}
