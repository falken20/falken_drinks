name: CI - Tests & Linting

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Linting (Flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint dependencies
        run: pip install flake8

      - name: Check syntax errors
        run: flake8 ./falken_drinks/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check code style
        run: flake8 ./falken_drinks/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          CONFIG_MODE: testing
          LEVEL_LOG: 'WARNING, ERROR'
        run: |
          coverage run -m pytest -v -s
          coverage report --omit="*/tests/*,*/venv/*" -m ./falken_drinks/*.py
          coverage xml --omit="*/tests/*,*/venv/*" -o coverage/python/coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: coverage/python/

  test-js:
    name: JavaScript Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JS tests with coverage
        run: npm run test:coverage

      - name: Upload JS coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: coverage/js/
